<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>塔RPG Ver7.9.1</title>

<style>
body{
font-family:sans-serif;
background:#111;
color:white;
text-align:center;
margin:0;
}

.game{
max-width:480px;
margin:auto;
padding:10px;
}

.bar{
width:100%;
height:20px;
background:#333;
border-radius:10px;
margin:5px 0;
}

.hpbar{
height:20px;
background:red;
border-radius:10px;
}

.enemybar{
height:15px;
background:lime;
border-radius:10px;
}

button{
margin:3px;
padding:10px;
font-size:16px;
border-radius:6px;
}

.item{
background:#222;
padding:6px;
margin:5px;
border-radius:8px;
}

.common{color:white}
.rare{color:#66aaff}
.epic{color:#cc66ff}
.legend{color:gold}
.mythic{color:red}
</style>
</head>

<body>

<div class="game">

<h2>🏯塔RPG Ver7.9.1</h2>

<h3 id="enemy"></h3>

<div class="bar">
<div id="enemybar" class="enemybar"></div>
</div>

<div id="enemyHP"></div>

<hr>

<div>階層 <span id="floor"></span></div>

<div class="bar">
<div id="hpbar" class="hpbar"></div>
</div>

<div>HP <span id="hp"></span></div>
<div>MP <span id="mp"></span></div>

<div>Lv <span id="level"></span></div>
<div>EXP <span id="exp"></span></div>

<div>💰 <span id="gold"></span></div>

<div>状態異常: <span id="status"></span></div>

<button id="attackBtn">⚔攻撃</button>
<button id="autoBtn">🔴オート戦闘OFF</button>

<br>

<label>オート優先スキル
<select id="prioritySkill">
<option value="0">🔥ファイア</option>
<option value="1">💧アイス</option>
<option value="2">⚡サンダー</option>
<option value="3">💖ヒール</option>
<option value="4">🛡バリア</option>
</select>
</label>

<div id="skills"></div>

<hr>

<h3>🎒装備</h3>

<button onclick="sortAtk()">ATK順</button>
<button onclick="sortRare()">レア順</button>

<div id="inventory"></div>

<hr>

<h3>🏪ショップ</h3>

<button onclick="buyPotion()">HPポーション 20G</button>
<button onclick="useStatusPotion()">💊状態異常回復 50G</button>
<button onclick="gacha()">装備ガチャ 100G</button>

<hr>

<button onclick="save()">💾セーブ</button>

<div id="log"></div>

</div>

<script>

/* 初期データ */

let floor=1
let level=1
let exp=0
let expMax=10

let playerMax=100
let playerHP=100

let playerMP=50
let playerMaxMP=50

let attack=5
let defense=2

let gold=0

let enemy="スライム"
let enemyHP=20
let enemyMax=20

let playerStatus=[]
let enemyStatus=[]

let auto=false
let nextFloor=false
let prioritySkill=2

let logHistory=[]

let inventory=[]

let rarity=["common","rare","epic","legend","mythic"]
let rarityOrder={common:1,rare:2,epic:3,legend:4,mythic:5}

/* ログ */

function log(t){
logHistory.unshift(t)
if(logHistory.length>6)logHistory.pop()
document.getElementById("log").innerHTML=logHistory.join("<br>")
}

/* 敵生成 */

function spawnEnemy(){

enemyMax=20+floor*5
enemyHP=enemyMax

let list=["スライム","ゴブリン","オオカミ","骸骨"]

enemy=list[Math.floor(Math.random()*list.length)]

if(floor%10==0){
enemy="🐉ボス"
enemyMax=200+floor*10
enemyHP=enemyMax
}

document.getElementById("enemy").innerText=enemy
}

/* 攻撃 */

function playerAttack(){

if(enemyHP<=0)return

let dmg=attack

if(Math.random()<0.15){
dmg*=2
log("⚡クリティカル")
}

enemyHP-=dmg

log("⚔ "+dmg+"ダメージ")

playerMP+=5
if(playerMP>playerMaxMP)playerMP=playerMaxMP

if(enemyHP<=0){
gold+=10+floor
exp+=5
nextFloor=true
}

enemyAttack()

update()

}

/* 敵攻撃 */

function enemyAttack(){

if(enemyHP<=0)return

if(enemy=="🐉ボス"){
bossAI()
return
}

let dmg=5-defense
if(dmg<1)dmg=1

playerHP-=dmg

log("敵攻撃 "+dmg)

if(playerHP<=0){
alert("ゲームオーバー")
location.reload()
}

}

/* ボスAI */

function bossAI(){

if(enemyHP<=enemyMax*0.5 && Math.random()<0.4){

let heal=Math.floor(enemyMax*0.2)

enemyHP+=heal

log("🐉ボス回復 "+heal)

return
}

let dmg=10+Math.floor(Math.random()*10)

playerHP-=dmg

log("🐉ボス攻撃 "+dmg)

if(Math.random()<0.2){
playerStatus.push({icon:"🔥",type:"burn",turns:3})
}

if(Math.random()<0.15){
playerStatus.push({icon:"⚡",type:"paralysis",turns:2})
}

if(Math.random()<0.1){
playerStatus.push({icon:"❄",type:"freeze",turns:1})
}

}

/* スキル */

let skills=[

{
name:"🔥ファイア",
cost:20,
action(){
if(playerMP<20)return
playerMP-=20
enemyHP-=attack*3
log("🔥ファイア")
}
},

{
name:"💧アイス",
cost:15,
action(){
if(playerMP<15)return
playerMP-=15
enemyHP-=attack*1.5

if(Math.random()<0.5){
enemyStatus.push({icon:"❄",type:"freeze",turns:1})
log("❄氷結")
}
}
},

{
name:"⚡サンダー",
cost:25,
action(){
if(playerMP<25)return
playerMP-=25
enemyHP-=attack*2

if(Math.random()<0.5){
enemyStatus.push({icon:"⚡",type:"paralysis",turns:2})
log("⚡麻痺")
}
}
},

{
name:"💖ヒール",
cost:15,
action(){
if(playerMP<15)return
playerMP-=15
playerHP+=30
if(playerHP>playerMax)playerHP=playerMax
}
},

{
name:"🛡バリア",
cost:20,
action(){
if(playerMP<20)return
playerMP-=20
defense+=5
setTimeout(()=>defense-=5,5000)
}
}

]

/* スキル描画 */

function drawSkills(){

let html=""

skills.forEach((s,i)=>{
html+=`<button onclick="skills[${i}].action()">${s.name}</button>`
})

document.getElementById("skills").innerHTML=html

}

/* 状態表示 */

function update(){

document.getElementById("floor").innerText=floor
document.getElementById("hp").innerText=playerHP+"/"+playerMax
document.getElementById("mp").innerText=playerMP+"/"+playerMaxMP
document.getElementById("level").innerText=level
document.getElementById("exp").innerText=exp+"/"+expMax
document.getElementById("gold").innerText=gold

document.getElementById("enemyHP").innerText=enemyHP+"/"+enemyMax

document.getElementById("hpbar").style.width=(playerHP/playerMax*100)+"%"
document.getElementById("enemybar").style.width=(enemyHP/enemyMax*100)+"%"

document.getElementById("status").innerText=playerStatus.map(s=>s.icon).join(" ")

}

/* 次階 */

function next(){

floor++
spawnEnemy()

}

/* オート */

function autoBattle(){

if(!auto)return

if(nextFloor){
nextFloor=false
next()
return
}

if(enemyHP<=0)return

playerAttack()

}

setInterval(autoBattle,1000)

/* ボタン */

document.getElementById("attackBtn").onclick=playerAttack

document.getElementById("autoBtn").onclick=function(){

auto=!auto

this.innerText=auto?"🟢オート戦闘ON":"🔴オート戦闘OFF"

}

/* スタート */

spawnEnemy()
drawSkills()
update()

</script>
</body>
</html>
